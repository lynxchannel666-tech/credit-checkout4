<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment</title>
<link rel="stylesheet" href="choice.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Elms+Sans:ital,wght@0,100..900;1,100..900&family=Faculty+Glyphic&display=swap" rel="stylesheet">
    
</head>

<body>
<div class="original">
<div class="container">

  <h1 class="heading">payment method</h1>
 
  <div class="wrapper">

    <div class="mastercard options" style="height: 60px; width: 360px; margin: 0;">

      <img src="./master card.jpg" height="45px">

      <p class="name">Master Card</p>

      <label class="circular-checkbox " id="master">
      <input required type="checkbox">
      </label>

    </div>

    <div class="paypal options" style="height: 60px; width: 360px; margin: 0;">

    <img src="./paypal.jpg" height="45px">

      <p class="name" >PayPal</p>
      
      <label class="circular-checkbox" id="pay">
      <input required type="checkbox">
      </label>

    </div>  

    <div class="visacard options" style="height: 60px; width: 360px; margin: 0;">

    <img src="./visa.jpg" height="45px" >

      <p class="name" >Visa Card</p>
      
      <label class="circular-checkbox" id="visa">
      <input required type="checkbox">
      </label>

    </div>


    <div class="googlepay options" style="height: 60px; width: 360px; margin: 0;">

    <img src="./googlepay.jpg" height="45px">

      <p class="name" >Google Pay</p>
      
      <label class="circular-checkbox" id="google">
      <input required type="checkbox">
      </label>

    </div>

   </div> 

    <a href="./credit.html"><button type="submit">confirm</button></a>
  
</div>
</div>
<div class="image">
<img src="./pexels-razone-gn-598584859-26926327.jpg" height="779.2" width="1052.8">
</div>
</div>
