<link rel="stylesheet" href="credit.css">

<body>
   <div class="original">   
    <div class="container">

        <h1 class="heading">CHECKOUT</h1>

        <form class="wrapper">
         <div class="name">

        <p class="typeof" id="name">Card Name</p>
        <input required type="text" name="firstname" id="firstname-input" >
         </div>


         <div class="number">

        <p class="typeof" id="number">Card Number</p>
        <input type="password"></input>

         </div>


         <div class="expiration 3rd">
        <p class="typeof" id="expire">Expiration</p>
        <input type="date" class="inwrapper inbutton" style="width: 150px;"></input>

         </div>


         <div class="cvv 3rd">

        <p class="typeof" id="cvv">CVV</p>
        <input type="number" class="inwrapper inbutton" style="width: 150px;"></input>

        </div>


        <div class="code">

        <p class="typeof" id="code">Postal Code</p>
        <input type="text"></input>

        </div>

        </form>

        <button type="submit">confirm</button>
        <a href="./index.html"><button type="submit" class="back"><</button></a>

    </div>    
  </div>
